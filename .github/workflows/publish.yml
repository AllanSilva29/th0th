name: Build and Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: 'What to publish'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - packages
          - apps
      tag:
        description: 'npm tag (latest, next, beta, alpha)'
        required: false
        default: 'latest'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all packages and apps
        run: bun run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            packages/*/dist
            apps/*/dist
          retention-days: 1

  publish-packages:
    needs: build
    runs-on: ubuntu-latest
    if: inputs.target == 'all' || inputs.target == 'packages'
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Publish @th0th/shared
        working-directory: packages/shared
        run: bun publish --access public --tag ${{ inputs.tag || 'latest' }} --tolerate-republish
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @th0th/core
        working-directory: packages/core
        run: bun publish --access public --tag ${{ inputs.tag || 'latest' }} --tolerate-republish
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-apps:
    needs: build
    runs-on: ubuntu-latest
    if: inputs.target == 'all' || inputs.target == 'apps'
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Publish @th0th/tools-api
        working-directory: apps/tools-api
        run: bun publish --access public --tag ${{ inputs.tag || 'latest' }} --tolerate-republish
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @th0th/mcp-client
        working-directory: apps/mcp-client
        run: bun publish --access public --tag ${{ inputs.tag || 'latest' }} --tolerate-republish
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @th0th/opencode-plugin
        working-directory: apps/opencode-plugin
        run: bun publish --access public --tag ${{ inputs.tag || 'latest' }} --tolerate-republish
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
